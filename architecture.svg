<svg xmlns="http://www.w3.org/2000/svg" width="700" height="660" viewBox="0 0 700 660"
     font-family="ui-monospace,'Cascadia Code','Source Code Pro',Menlo,monospace">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="700" height="660" fill="#f8f9fb"/>

  <!-- ── Clients ── -->
  <rect x="250" y="20" width="200" height="50" rx="6"
        fill="#eff6ff" stroke="#3b6bcc" stroke-width="1.5"/>
  <text x="350" y="51" text-anchor="middle"
        fill="#1e3a8a" font-size="15" font-weight="700">Clients</text>

  <!-- arrow Clients → HTTP Server -->
  <line x1="350" y1="70" x2="350" y2="103"
        stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="358" y="90" fill="#9ca3af" font-size="11">POST /infer  ·  GET /health</text>

  <!-- ── HTTP Server ── -->
  <rect x="175" y="105" width="350" height="62" rx="6"
        fill="#3b6bcc" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="350" y="131" text-anchor="middle"
        fill="white" font-size="14" font-weight="700">HTTP Server</text>
  <text x="350" y="153" text-anchor="middle"
        fill="#bfdbfe" font-size="12">cpp-httplib · port 8080</text>

  <!-- arrow HTTP Server → RateLimiter -->
  <line x1="350" y1="167" x2="350" y2="200"
        stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── RateLimiter ── -->
  <rect x="175" y="202" width="350" height="62" rx="6"
        fill="#d97706" stroke="#92400e" stroke-width="1.5"/>
  <text x="350" y="228" text-anchor="middle"
        fill="white" font-size="14" font-weight="700">RateLimiter</text>
  <text x="350" y="250" text-anchor="middle"
        fill="#fde68a" font-size="12">token bucket · per tenant</text>

  <!-- arrow RateLimiter → Engine -->
  <line x1="350" y1="264" x2="350" y2="298"
        stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ContinuousBatchEngine outer box ── -->
  <rect x="80" y="300" width="540" height="252" rx="8"
        fill="#eef2ff" stroke="#1e3a8a" stroke-width="2"/>
  <text x="350" y="323" text-anchor="middle"
        fill="#1e3a8a" font-size="14" font-weight="700">ContinuousBatchEngine</text>

  <!-- Admission loop -->
  <rect x="108" y="332" width="484" height="46" rx="4"
        fill="white" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="350" y="350" text-anchor="middle"
        fill="#1e3a8a" font-size="13" font-weight="600">Admission loop</text>
  <text x="350" y="369" text-anchor="middle"
        fill="#3b6bcc" font-size="11">priority + deadline order</text>

  <!-- KVSlotManager -->
  <rect x="108" y="385" width="484" height="46" rx="4"
        fill="white" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="350" y="403" text-anchor="middle"
        fill="#1e3a8a" font-size="13" font-weight="600">KVSlotManager</text>
  <text x="350" y="422" text-anchor="middle"
        fill="#3b6bcc" font-size="11">seq_id ↔ KV cell tracking</text>

  <!-- Decode loop -->
  <rect x="108" y="438" width="484" height="46" rx="4"
        fill="white" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="350" y="456" text-anchor="middle"
        fill="#1e3a8a" font-size="13" font-weight="600">Decode loop</text>
  <text x="350" y="475" text-anchor="middle"
        fill="#3b6bcc" font-size="11">llama_decode per step</text>

  <!-- Sampling + EOS detection -->
  <rect x="108" y="491" width="484" height="46" rx="4"
        fill="white" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="350" y="509" text-anchor="middle"
        fill="#1e3a8a" font-size="13" font-weight="600">Per-sequence sampling</text>
  <text x="350" y="528" text-anchor="middle"
        fill="#3b6bcc" font-size="11">+ EOS detection</text>

  <!-- branch left → Metrics -->
  <path d="M 220 552 V 578 H 160 V 598"
        stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- branch right → on_complete -->
  <path d="M 480 552 V 578 H 540 V 598"
        stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ── Metrics ── -->
  <rect x="60" y="600" width="200" height="56" rx="6"
        fill="#16a34a" stroke="#14532d" stroke-width="1.5"/>
  <text x="160" y="624" text-anchor="middle"
        fill="white" font-size="13" font-weight="700">Metrics</text>
  <text x="160" y="643" text-anchor="middle"
        fill="#bbf7d0" font-size="11">prometheus-cpp · port 9090</text>

  <!-- ── on_complete callback ── -->
  <rect x="440" y="600" width="200" height="56" rx="6"
        fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5"/>
  <text x="540" y="624" text-anchor="middle"
        fill="white" font-size="13" font-weight="700">on_complete</text>
  <text x="540" y="643" text-anchor="middle"
        fill="#ddd6fe" font-size="11">callback → HTTP response</text>
</svg>
