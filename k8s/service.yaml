apiVersion: v1
kind: Service
metadata:
  name: inference-server
  namespace: default
spec:
  selector:
    app: inference-server
  ports:
  - name: http
    port: 80
    targetPort: 8080
  - name: grpc
    port: 50051
    targetPort: 50051
  - name: metrics
    port: 9090
    targetPort: 9090
  type: LoadBalancer
